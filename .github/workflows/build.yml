name: Build Executables

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-22.04
            name: linux
            artifact: SolfeggIO-linux
            lilypond_binary: lilypond
          - os: windows-latest
            name: windows
            artifact: SolfeggIO-windows.exe
            lilypond_binary: lilypond.exe
          - os: macos-latest
            name: macos
            artifact: SolfeggIO-macos
            lilypond_binary: lilypond

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      # ── Install system dependencies (Linux) ───────────────────
      - name: Install Linux system dependencies
        if: matrix.os == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libxcb-cursor0 \
            libxcb-xinerama0 \
            libxcb-icccm4 \
            libxcb-image0 \
            libxcb-keysyms1 \
            libxcb-randr0 \
            libxcb-render-util0 \
            libxcb-xkb1 \
            libxkbcommon-x11-0 \
            libegl1

      # ── Download and bundle LilyPond (Linux) ──────────────────
      - name: Download LilyPond (Linux)
        if: matrix.os == 'ubuntu-22.04'
        run: |
          wget -q https://gitlab.com/lilypond/lilypond/-/releases/v2.24.3/downloads/lilypond-2.24.3-linux-x86_64.tar.gz
          tar -xzf lilypond-2.24.3-linux-x86_64.tar.gz
          mkdir -p bundled_lilypond
          cp -r lilypond-2.24.3/bin bundled_lilypond/
          cp -r lilypond-2.24.3/lib bundled_lilypond/
          cp -r lilypond-2.24.3/share bundled_lilypond/
          echo "LilyPond binary: $(bundled_lilypond/bin/lilypond --version | head -1)"

      # ── Download and bundle LilyPond (macOS) ──────────────────
      - name: Download LilyPond (macOS)
        if: matrix.os == 'macos-latest'
        run: |
          wget -q https://gitlab.com/lilypond/lilypond/-/releases/v2.24.3/downloads/lilypond-2.24.3-darwin-x86_64.tar.gz
          tar -xzf lilypond-2.24.3-darwin-x86_64.tar.gz
          mkdir -p bundled_lilypond
          cp -r lilypond-2.24.3/bin bundled_lilypond/
          cp -r lilypond-2.24.3/lib bundled_lilypond/
          cp -r lilypond-2.24.3/share bundled_lilypond/
          echo "LilyPond binary: $(bundled_lilypond/bin/lilypond --version | head -1)"

      # ── Download and bundle LilyPond (Windows) ────────────────
      - name: Download LilyPond (Windows)
        if: matrix.os == 'windows-latest'
        shell: bash
        run: |
          curl -L -o lilypond.zip https://gitlab.com/lilypond/lilypond/-/releases/v2.24.3/downloads/lilypond-2.24.3-mingw-x86_64.zip
          unzip -q lilypond.zip
          mkdir -p bundled_lilypond
          cp -r lilypond-2.24.3/bin bundled_lilypond/
          cp -r lilypond-2.24.3/lib bundled_lilypond/
          cp -r lilypond-2.24.3/share bundled_lilypond/

      # ── Python dependencies ───────────────────────────────────
      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller

      # ── Build ─────────────────────────────────────────────────
      - name: Build executable with PyInstaller
        run: pyinstaller solfeggio.spec

      - name: Verify executable was created
        shell: bash
        run: |
          echo "Contents of dist/:"
          ls -la dist/
          test -f dist/SolfeggIO || test -f dist/SolfeggIO.exe || (echo "ERROR: No executable found!" && exit 1)

      # ── Rename output ─────────────────────────────────────────
      - name: Rename executable (Linux/macOS)
        if: matrix.os != 'windows-latest'
        run: mv dist/SolfeggIO dist/${{ matrix.artifact }}

      - name: Rename executable (Windows)
        if: matrix.os == 'windows-latest'
        run: mv dist/SolfeggIO.exe dist/${{ matrix.artifact }}
        shell: bash

      # ── Upload artifact ───────────────────────────────────────
      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: dist/${{ matrix.artifact }}
          retention-days: 30

  # ── Create GitHub Release ─────────────────────────────────────
  release:
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    permissions:
      contents: write

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: SolfeggIO ${{ github.ref_name }}
          body: |
            ## SolfeggIO ${{ github.ref_name }}

            ### Installation
            1. Download the executable for your platform below
            2. Launch it — no Python or LilyPond installation required!

            **macOS users:** See the [macOS Notes](https://github.com/ludocavalieri/solfeggio#-macos-notes) in the README if macOS blocks the app on first launch.
            **Windows users:** See the [Windows Notes](https://github.com/ludocavalieri/solfeggio#-windows-notes) in the README if SmartScreen blocks the app on first launch.
          files: |
            dist/SolfeggIO-linux/SolfeggIO-linux
            dist/SolfeggIO-windows.exe/SolfeggIO-windows.exe
            dist/SolfeggIO-macos/SolfeggIO-macos
          draft: false
          prerelease: ${{ contains(github.ref_name, 'alpha') || contains(github.ref_name, 'beta') }}